name: Merge summary

on:
  pull_request:
    types: [closed]

jobs:
  comment-diff:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write      # to comment
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2        # we need parent commit
      - name: Post compact diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          echo '### 🔄 Merged PR snapshot' > summary.md
          echo "\`\`\`diff" >> summary.md
          git diff --compact-summary "$MERGE_SHA"^ "$MERGE_SHA" >> summary.md
          echo "\`\`\`" >> summary.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file summary.md
